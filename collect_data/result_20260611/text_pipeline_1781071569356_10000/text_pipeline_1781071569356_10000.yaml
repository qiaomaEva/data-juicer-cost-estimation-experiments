project_name: text_pipeline_1781071569356_10000
dataset:
  configs:
  - type: local
    path: /data/data-juicer_dataset/RedPajama/indices/c4_10000.jsonl
    format: jsonl
export_path: /home/yyw/pipeline_full/results/text/text_pipeline_1781071569356_10000.jsonl
np: 50
use_cache: false
open_tracer: true
process:
- fix_unicode_mapper:
    normalization: NFD
- whitespace_normalization_mapper: null
- punctuation_normalization_mapper: null
- remove_long_words_mapper:
    min_len: 4
    max_len: 13
- sentence_split_mapper:
    lang: en
- clean_links_mapper: null
- token_num_filter:
    hf_tokenizer: EleutherAI/pythia-14m
    min_num: 186
    max_num: 560
- text_length_filter:
    min_len: 705
    max_len: 4017
- flagged_words_filter:
    lang: en
    tokenization: false
    max_ratio: 0.05
    use_words_aug: false
- document_simhash_deduplicator:
    tokenization: space
    lowercase: true
    ignore_pattern: \p{P}
op_list_to_trace:

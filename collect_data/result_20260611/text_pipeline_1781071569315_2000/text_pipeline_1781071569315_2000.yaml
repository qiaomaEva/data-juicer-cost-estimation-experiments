project_name: text_pipeline_1781071569315_2000
dataset:
  configs:
  - type: local
    path: /data/data-juicer_dataset/RedPajama/indices/c4_2000.jsonl
    format: jsonl
export_path: /home/yyw/pipeline_full/results/text/text_pipeline_1781071569315_2000.jsonl
np: 30
use_cache: false
open_tracer: true
process:
- whitespace_normalization_mapper: null
- fix_unicode_mapper:
    normalization: NFKC
- replace_content_mapper:
    pattern: ●■
    repl: <hide>
- remove_long_words_mapper:
    min_len: 4
    max_len: 13
- remove_words_with_incorrect_substrings_mapper:
    lang: en
    tokenization: true
    substrings:
    - http
    - www
    - .com
    - href
    - //
- remove_specific_chars_mapper: null
- clean_email_mapper: null
- sentence_split_mapper:
    lang: en
- clean_ip_mapper: null
- clean_links_mapper: null
- token_num_filter:
    hf_tokenizer: EleutherAI/pythia-14m
    min_num: 241
    max_num: 396
- language_id_score_filter:
    lang:
    - en
    - zh
    min_score: 0.7
- stopwords_filter:
    lang: en
    tokenization: false
    min_ratio: 0.3
    use_words_aug: false
- maximum_line_length_filter:
    min_len: 374
    max_len: 791
    batch_size: 2
- document_simhash_deduplicator:
    tokenization: space
    lowercase: true
    ignore_pattern: \p{P}
op_list_to_trace:
- whitespace_normalization_mapper
- fix_unicode_mapper
- replace_content_mapper
- remove_long_words_mapper
- remove_words_with_incorrect_substrings_mapper
- remove_specific_chars_mapper
- clean_email_mapper
- sentence_split_mapper
- clean_ip_mapper
- clean_links_mapper
- token_num_filter
- language_id_score_filter
- stopwords_filter
- maximum_line_length_filter
- document_simhash_deduplicator

project_name: text_pipeline_1781071569502_10000
dataset:
  configs:
  - type: local
    path: /data/data-juicer_dataset/RedPajama/indices/c4_10000.jsonl
    format: jsonl
export_path: /home/yyw/pipeline_full/results/text/text_pipeline_1781071569502_10000.jsonl
np: 50
use_cache: false
open_tracer: true
process:
- punctuation_normalization_mapper: null
- replace_content_mapper:
    pattern: \d+(?:,\d+)*
    repl: <hide>
- sentence_split_mapper:
    lang: en
- clean_ip_mapper: null
- clean_links_mapper: null
- remove_specific_chars_mapper: null
- remove_words_with_incorrect_substrings_mapper:
    lang: en
    tokenization: false
    substrings:
    - http
    - www
    - .com
    - href
    - //
- remove_table_text_mapper: null
- clean_copyright_mapper: null
- maximum_line_length_filter:
    min_len: 305
    max_len: 579
    batch_size: 3
- language_id_score_filter:
    lang:
    - en
    - zh
    min_score: 0.8
- average_line_length_filter:
    min_len: 94
    max_len: 7948
    batch_size: 3
- text_action_filter:
    lang: en
- text_length_filter:
    min_len: 1045
    max_len: 2676
- text_chunk_mapper:
    max_len: 1272
    split_pattern: \n
- alphanumeric_filter:
    tokenization: true
    min_ratio: 0.3
    max_ratio: 0.9
    batch_size: 3
    num_proc: 2
- special_characters_filter:
    min_ratio: 0.1
    max_ratio: 0.25
    batch_size: 3
- character_repetition_filter:
    rep_len: 10
    min_ratio: 0.0
    max_ratio: 0.3
    batch_size: 2
- document_simhash_deduplicator:
    tokenization: space
    lowercase: false
    ignore_pattern: \p{P}
op_list_to_trace:
- punctuation_normalization_mapper
- replace_content_mapper
- sentence_split_mapper
- clean_ip_mapper
- clean_links_mapper
- remove_specific_chars_mapper
- remove_words_with_incorrect_substrings_mapper
- remove_table_text_mapper
- clean_copyright_mapper
- maximum_line_length_filter
- language_id_score_filter
- average_line_length_filter
- text_action_filter
- text_length_filter
- alphanumeric_filter
- special_characters_filter
- character_repetition_filter
- document_simhash_deduplicator

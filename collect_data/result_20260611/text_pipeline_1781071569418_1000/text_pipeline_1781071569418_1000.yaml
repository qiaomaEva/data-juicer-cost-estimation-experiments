project_name: text_pipeline_1781071569418_1000
dataset:
  configs:
  - type: local
    path: /data/data-juicer_dataset/RedPajama/indices/c4_1000.jsonl
    format: jsonl
export_path: /home/yyw/pipeline_full/results/text/text_pipeline_1781071569418_1000.jsonl
np: 40
use_cache: false
open_tracer: true
process:
- punctuation_normalization_mapper: null
- remove_table_text_mapper: null
- remove_long_words_mapper:
    min_len: 4
    max_len: 18
- remove_specific_chars_mapper: null
- clean_email_mapper: null
- clean_ip_mapper: null
- remove_words_with_incorrect_substrings_mapper:
    lang: en
    tokenization: true
    substrings:
    - http
    - www
    - .com
    - href
    - //
- sentence_split_mapper:
    lang: en
- clean_copyright_mapper: null
- replace_content_mapper:
    pattern: ●■
    repl: <hide>
- special_characters_filter:
    min_ratio: 0.1
    max_ratio: 0.2
    batch_size: 3
- perplexity_filter:
    lang: en
    max_ppl: 1327
    batch_size: 3
- text_length_filter:
    min_len: 578
    max_len: 1680
- alphanumeric_filter:
    tokenization: false
    min_ratio: 0.1
    max_ratio: 0.9
    batch_size: 2
    num_proc: 4
- maximum_line_length_filter:
    min_len: 343
    max_len: 835
    batch_size: 2
- language_id_score_filter:
    lang: en
    min_score: 0.8
- average_line_length_filter:
    min_len: 63
    max_len: 3742
    batch_size: 3
- flagged_words_filter:
    lang: en
    tokenization: false
    max_ratio: 0.045
    use_words_aug: false
- text_chunk_mapper:
    max_len: 1022
    split_pattern: '. '
- document_simhash_deduplicator:
    tokenization: space
    lowercase: false
    ignore_pattern: \p{P}
op_list_to_trace:
- punctuation_normalization_mapper
- remove_table_text_mapper
- remove_long_words_mapper
- remove_specific_chars_mapper
- clean_email_mapper
- clean_ip_mapper
- remove_words_with_incorrect_substrings_mapper
- sentence_split_mapper
- clean_copyright_mapper
- replace_content_mapper
- special_characters_filter
- perplexity_filter
- text_length_filter
- alphanumeric_filter
- maximum_line_length_filter
- language_id_score_filter
- average_line_length_filter
- flagged_words_filter
- document_simhash_deduplicator

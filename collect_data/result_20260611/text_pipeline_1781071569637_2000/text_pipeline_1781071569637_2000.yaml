project_name: text_pipeline_1781071569637_2000
dataset:
  configs:
  - type: local
    path: /data/data-juicer_dataset/RedPajama/indices/c4_2000.jsonl
    format: jsonl
export_path: /home/yyw/pipeline_full/results/text/text_pipeline_1781071569637_2000.jsonl
np: 50
use_cache: false
open_tracer: true
process:
- fix_unicode_mapper:
    normalization: NFD
- remove_repeat_sentences_mapper:
    lowercase: false
- remove_table_text_mapper: null
- remove_long_words_mapper:
    min_len: 5
    max_len: 19
- clean_email_mapper: null
- clean_links_mapper: null
- clean_ip_mapper: null
- remove_specific_chars_mapper: null
- flagged_words_filter:
    lang: en
    tokenization: true
    max_ratio: 0.05
    use_words_aug: false
- words_num_filter:
    lang: en
    tokenization: true
    min_num: 53
    max_num: 230
    batch_size: 2
- text_length_filter:
    min_len: 610
    max_len: 2180
- word_repetition_filter:
    lang: en
    tokenization: false
    rep_len: 10
    min_ratio: 0.1
    max_ratio: 0.3
    batch_size: 3
- perplexity_filter:
    lang: en
    max_ppl: 631
    batch_size: 2
- text_entity_dependency_filter:
    lang: en
    any_or_all: all
- document_simhash_deduplicator:
    tokenization: space
    lowercase: false
    ignore_pattern: \p{P}
op_list_to_trace:
- fix_unicode_mapper
- remove_repeat_sentences_mapper
- remove_table_text_mapper
- remove_long_words_mapper
- clean_email_mapper
- clean_links_mapper
- clean_ip_mapper
- remove_specific_chars_mapper
- flagged_words_filter
- words_num_filter
- text_length_filter
- word_repetition_filter
- perplexity_filter
- text_entity_dependency_filter
- document_simhash_deduplicator

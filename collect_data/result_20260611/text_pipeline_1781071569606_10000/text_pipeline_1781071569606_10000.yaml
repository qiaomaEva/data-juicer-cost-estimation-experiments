project_name: text_pipeline_1781071569606_10000
dataset:
  configs:
  - type: local
    path: /data/data-juicer_dataset/RedPajama/indices/c4_10000.jsonl
    format: jsonl
export_path: /home/yyw/pipeline_full/results/text/text_pipeline_1781071569606_10000.jsonl
np: 50
use_cache: false
open_tracer: true
process:
- whitespace_normalization_mapper: null
- punctuation_normalization_mapper: null
- remove_specific_chars_mapper: null
- clean_links_mapper: null
- replace_content_mapper:
    pattern: ●■
    repl: ''
- remove_repeat_sentences_mapper:
    lowercase: false
- clean_email_mapper: null
- remove_table_text_mapper: null
- clean_ip_mapper: null
- remove_words_with_incorrect_substrings_mapper:
    lang: en
    tokenization: false
    substrings:
    - http
    - www
    - .com
    - href
    - //
- remove_long_words_mapper:
    min_len: 3
    max_len: 17
- text_chunk_mapper:
    max_len: 1689
    split_pattern: \n
- text_action_filter:
    lang: en
- stopwords_filter:
    lang: en
    tokenization: true
    min_ratio: 0.3
    use_words_aug: true
- text_entity_dependency_filter:
    lang: en
    any_or_all: all
- alphanumeric_filter:
    tokenization: true
    min_ratio: 0.2
    max_ratio: 0.9
    batch_size: 2
    num_proc: 1
- words_num_filter:
    lang: en
    tokenization: false
    min_num: 173
    max_num: 320
    batch_size: 3
- perplexity_filter:
    lang: en
    max_ppl: 2807
    batch_size: 2
- document_simhash_deduplicator:
    tokenization: character
    lowercase: true
    ignore_pattern: \p{P}
op_list_to_trace:
- whitespace_normalization_mapper
- punctuation_normalization_mapper
- remove_specific_chars_mapper
- clean_links_mapper
- replace_content_mapper
- remove_repeat_sentences_mapper
- clean_email_mapper
- remove_table_text_mapper
- clean_ip_mapper
- remove_words_with_incorrect_substrings_mapper
- remove_long_words_mapper
- text_action_filter
- stopwords_filter
- text_entity_dependency_filter
- alphanumeric_filter
- words_num_filter
- perplexity_filter
- document_simhash_deduplicator

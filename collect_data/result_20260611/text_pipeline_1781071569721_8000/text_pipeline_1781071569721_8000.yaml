project_name: text_pipeline_1781071569721_8000
dataset:
  configs:
  - type: local
    path: /data/data-juicer_dataset/RedPajama/indices/c4_8000.jsonl
    format: jsonl
export_path: /home/yyw/pipeline_full/results/text/text_pipeline_1781071569721_8000.jsonl
np: 40
use_cache: false
open_tracer: true
process:
- whitespace_normalization_mapper: null
- fix_unicode_mapper:
    normalization: NFKD
- punctuation_normalization_mapper: null
- clean_links_mapper: null
- remove_table_text_mapper: null
- clean_ip_mapper: null
- remove_words_with_incorrect_substrings_mapper:
    lang: en
    tokenization: false
    substrings:
    - <
    - '>'
    - '='
    - '&'
    - '?'
- remove_specific_chars_mapper: null
- clean_copyright_mapper: null
- clean_email_mapper: null
- remove_long_words_mapper:
    min_len: 3
    max_len: 19
- remove_repeat_sentences_mapper:
    lowercase: false
- stopwords_filter:
    lang: en
    tokenization: true
    min_ratio: 0.4
    use_words_aug: true
- text_chunk_mapper:
    max_len: 575
    split_pattern: '. '
- text_action_filter:
    lang: en
- text_entity_dependency_filter:
    lang: en
    any_or_all: any
- character_repetition_filter:
    rep_len: 5
    min_ratio: 0.0
    max_ratio: 0.4
    batch_size: 2
- token_num_filter:
    hf_tokenizer: EleutherAI/pythia-14m
    min_num: 137
    max_num: 1153
- maximum_line_length_filter:
    min_len: 102
    max_len: 410
    batch_size: 3
- perplexity_filter:
    lang: en
    max_ppl: 1685
    batch_size: 2
- flagged_words_filter:
    lang: en
    tokenization: false
    max_ratio: 0.045
    use_words_aug: true
- document_simhash_deduplicator:
    tokenization: space
    lowercase: false
    ignore_pattern: \p{P}
op_list_to_trace:
- whitespace_normalization_mapper
- fix_unicode_mapper
- punctuation_normalization_mapper
- clean_links_mapper
- remove_table_text_mapper
- clean_ip_mapper
- remove_words_with_incorrect_substrings_mapper
- remove_specific_chars_mapper
- clean_copyright_mapper
- clean_email_mapper
- remove_long_words_mapper
- remove_repeat_sentences_mapper
- stopwords_filter
- text_action_filter
- text_entity_dependency_filter
- character_repetition_filter
- token_num_filter
- maximum_line_length_filter
- perplexity_filter
- flagged_words_filter
- document_simhash_deduplicator

project_name: text_pipeline_1781071569272_8000
dataset:
  configs:
  - type: local
    path: /data/data-juicer_dataset/RedPajama/indices/c4_8000.jsonl
    format: jsonl
export_path: /home/yyw/pipeline_full/results/text/text_pipeline_1781071569272_8000.jsonl
np: 50
use_cache: false
open_tracer: true
process:
- punctuation_normalization_mapper: null
- fix_unicode_mapper:
    normalization: NFKD
- whitespace_normalization_mapper: null
- remove_words_with_incorrect_substrings_mapper:
    lang: en
    tokenization: false
    substrings:
    - <
    - '>'
    - '='
    - '&'
    - '?'
- clean_email_mapper: null
- remove_repeat_sentences_mapper:
    lowercase: true
- clean_links_mapper: null
- replace_content_mapper:
    pattern: ●■
    repl: ''
- clean_ip_mapper: null
- remove_long_words_mapper:
    min_len: 5
    max_len: 12
- alphanumeric_filter:
    tokenization: false
    min_ratio: 0.1
    max_ratio: 0.9
    batch_size: 3
    num_proc: 1
- stopwords_filter:
    lang: en
    tokenization: false
    min_ratio: 0.3
    use_words_aug: false
- maximum_line_length_filter:
    min_len: 178
    max_len: 961
    batch_size: 2
- text_entity_dependency_filter:
    lang: en
    any_or_all: all
- text_length_filter:
    min_len: 558
    max_len: 7082
- text_chunk_mapper:
    max_len: 629
    split_pattern: '. '
- special_characters_filter:
    min_ratio: 0.1
    max_ratio: 0.2
    batch_size: 3
- token_num_filter:
    hf_tokenizer: EleutherAI/pythia-14m
    min_num: 113
    max_num: 991
- text_action_filter:
    lang: en
- document_simhash_deduplicator:
    tokenization: character
    lowercase: false
    ignore_pattern: \p{P}
op_list_to_trace:
- punctuation_normalization_mapper
- fix_unicode_mapper
- whitespace_normalization_mapper
- remove_words_with_incorrect_substrings_mapper
- clean_email_mapper
- remove_repeat_sentences_mapper
- clean_links_mapper
- replace_content_mapper
- clean_ip_mapper
- remove_long_words_mapper
- alphanumeric_filter
- stopwords_filter
- maximum_line_length_filter
- text_entity_dependency_filter
- text_length_filter
- special_characters_filter
- token_num_filter
- text_action_filter
- document_simhash_deduplicator

project_name: text_pipeline_1781071569533_10000
dataset:
  configs:
  - type: local
    path: /data/data-juicer_dataset/RedPajama/indices/c4_10000.jsonl
    format: jsonl
export_path: /home/yyw/pipeline_full/results/text/text_pipeline_1781071569533_10000.jsonl
np: 30
use_cache: false
open_tracer: true
process:
- whitespace_normalization_mapper: null
- fix_unicode_mapper:
    normalization: NFD
- remove_long_words_mapper:
    min_len: 4
    max_len: 14
- remove_words_with_incorrect_substrings_mapper:
    lang: en
    tokenization: true
    substrings:
    - http
    - www
    - .com
    - href
    - //
- remove_table_text_mapper: null
- clean_links_mapper: null
- sentence_split_mapper:
    lang: en
- remove_repeat_sentences_mapper:
    lowercase: false
- clean_email_mapper: null
- average_line_length_filter:
    min_len: 24
    max_len: 4270
    batch_size: 3
- text_entity_dependency_filter:
    lang: en
    any_or_all: all
- stopwords_filter:
    lang: en
    tokenization: false
    min_ratio: 0.4
    use_words_aug: false
- maximum_line_length_filter:
    min_len: 280
    max_len: 887
    batch_size: 3
- text_action_filter:
    lang: en
- word_repetition_filter:
    lang: en
    tokenization: true
    rep_len: 5
    min_ratio: 0.1
    max_ratio: 0.15
    batch_size: 2
- alphanumeric_filter:
    tokenization: true
    min_ratio: 0.1
    max_ratio: 0.8
    batch_size: 3
    num_proc: 4
- text_chunk_mapper:
    max_len: 1727
    split_pattern: \n
- special_characters_filter:
    min_ratio: 0.0
    max_ratio: 0.2
    batch_size: 3
- document_simhash_deduplicator:
    tokenization: character
    lowercase: false
    ignore_pattern: \p{P}
op_list_to_trace:
- whitespace_normalization_mapper
- fix_unicode_mapper
- remove_long_words_mapper
- remove_words_with_incorrect_substrings_mapper
- remove_table_text_mapper
- clean_links_mapper
- sentence_split_mapper
- remove_repeat_sentences_mapper
- clean_email_mapper
- average_line_length_filter
- text_entity_dependency_filter
- stopwords_filter
- maximum_line_length_filter
- text_action_filter
- word_repetition_filter
- alphanumeric_filter
- special_characters_filter
- document_simhash_deduplicator

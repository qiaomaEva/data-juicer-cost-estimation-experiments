project_name: text_pipeline_1781071569283_1000
dataset:
  configs:
  - type: local
    path: /data/data-juicer_dataset/RedPajama/indices/c4_1000.jsonl
    format: jsonl
export_path: /home/yyw/pipeline_full/results/text/text_pipeline_1781071569283_1000.jsonl
np: 50
use_cache: false
open_tracer: true
process:
- punctuation_normalization_mapper: null
- remove_repeat_sentences_mapper:
    lowercase: false
- clean_copyright_mapper: null
- replace_content_mapper:
    pattern: \d+(?:,\d+)*
    repl: ''
- remove_words_with_incorrect_substrings_mapper:
    lang: en
    tokenization: false
    substrings:
    - <
    - '>'
    - '='
    - '&'
    - '?'
- maximum_line_length_filter:
    min_len: 269
    max_len: 976
    batch_size: 3
- special_characters_filter:
    min_ratio: 0.1
    max_ratio: 0.2
    batch_size: 3
- perplexity_filter:
    lang: en
    max_ppl: 2535
    batch_size: 3
- text_length_filter:
    min_len: 986
    max_len: 6652
- language_id_score_filter:
    lang:
    - en
    - zh
    min_score: 0.8
- text_entity_dependency_filter:
    lang: en
    any_or_all: any
- document_simhash_deduplicator:
    tokenization: space
    lowercase: true
    ignore_pattern: \p{P}
op_list_to_trace:
- punctuation_normalization_mapper
- remove_repeat_sentences_mapper
- clean_copyright_mapper
- replace_content_mapper
- remove_words_with_incorrect_substrings_mapper
- maximum_line_length_filter
- special_characters_filter
- perplexity_filter
- text_length_filter
- language_id_score_filter
- text_entity_dependency_filter
- document_simhash_deduplicator

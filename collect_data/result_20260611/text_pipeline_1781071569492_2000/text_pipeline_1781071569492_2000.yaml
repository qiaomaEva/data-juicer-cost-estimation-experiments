project_name: text_pipeline_1781071569492_2000
dataset:
  configs:
  - type: local
    path: /data/data-juicer_dataset/RedPajama/indices/c4_2000.jsonl
    format: jsonl
export_path: /home/yyw/pipeline_full/results/text/text_pipeline_1781071569492_2000.jsonl
np: 40
use_cache: false
open_tracer: true
process:
- fix_unicode_mapper:
    normalization: NFKD
- punctuation_normalization_mapper: null
- whitespace_normalization_mapper: null
- remove_long_words_mapper:
    min_len: 5
    max_len: 18
- remove_repeat_sentences_mapper:
    lowercase: true
- replace_content_mapper:
    pattern: ●■
    repl: <hide>
- remove_specific_chars_mapper: null
- clean_copyright_mapper: null
- sentence_split_mapper:
    lang: en
- remove_words_with_incorrect_substrings_mapper:
    lang: en
    tokenization: false
    substrings:
    - <
    - '>'
    - '='
    - '&'
    - '?'
- remove_table_text_mapper: null
- alphanumeric_filter:
    tokenization: false
    min_ratio: 0.1
    max_ratio: 0.9
    batch_size: 3
    num_proc: 1
- text_entity_dependency_filter:
    lang: en
    any_or_all: any
- average_line_length_filter:
    min_len: 35
    max_len: 6324
    batch_size: 3
- text_length_filter:
    min_len: 257
    max_len: 4369
- perplexity_filter:
    lang: en
    max_ppl: 722
    batch_size: 3
- text_action_filter:
    lang: en
- word_repetition_filter:
    lang: en
    tokenization: true
    rep_len: 3
    min_ratio: 0.1
    max_ratio: 0.2
    batch_size: 3
- text_chunk_mapper:
    max_len: 1869
    split_pattern: \n
- flagged_words_filter:
    lang: en
    tokenization: false
    max_ratio: 0.05
    use_words_aug: false
- document_simhash_deduplicator:
    tokenization: space
    lowercase: false
    ignore_pattern: \p{P}
op_list_to_trace:
- fix_unicode_mapper
- punctuation_normalization_mapper
- whitespace_normalization_mapper
- remove_long_words_mapper
- remove_repeat_sentences_mapper
- replace_content_mapper
- remove_specific_chars_mapper
- clean_copyright_mapper
- sentence_split_mapper
- remove_words_with_incorrect_substrings_mapper
- remove_table_text_mapper
- alphanumeric_filter
- text_entity_dependency_filter
- average_line_length_filter
- text_length_filter
- perplexity_filter
- text_action_filter
- word_repetition_filter
- flagged_words_filter
- document_simhash_deduplicator

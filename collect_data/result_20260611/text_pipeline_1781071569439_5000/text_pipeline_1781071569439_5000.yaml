project_name: text_pipeline_1781071569439_5000
dataset:
  configs:
  - type: local
    path: /data/data-juicer_dataset/RedPajama/indices/c4_5000.jsonl
    format: jsonl
export_path: /home/yyw/pipeline_full/results/text/text_pipeline_1781071569439_5000.jsonl
np: 50
use_cache: false
open_tracer: true
process:
- whitespace_normalization_mapper: null
- remove_table_text_mapper: null
- clean_ip_mapper: null
- clean_copyright_mapper: null
- remove_long_words_mapper:
    min_len: 3
    max_len: 19
- replace_content_mapper:
    pattern: \d+(?:,\d+)*
    repl: <hide>
- sentence_split_mapper:
    lang: en
- clean_email_mapper: null
- clean_links_mapper: null
- remove_repeat_sentences_mapper:
    lowercase: true
- text_chunk_mapper:
    max_len: 1240
    split_pattern: '. '
- average_line_length_filter:
    min_len: 77
    max_len: 5748
    batch_size: 3
- maximum_line_length_filter:
    min_len: 240
    max_len: 649
    batch_size: 3
- character_repetition_filter:
    rep_len: 5
    min_ratio: 0.1
    max_ratio: 0.4
    batch_size: 3
- stopwords_filter:
    lang: en
    tokenization: false
    min_ratio: 0.4
    use_words_aug: false
- document_simhash_deduplicator:
    tokenization: character
    lowercase: false
    ignore_pattern: \p{P}
op_list_to_trace:

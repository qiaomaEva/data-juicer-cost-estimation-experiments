project_name: text_pipeline_1781071569481_2000
dataset:
  configs:
  - type: local
    path: /data/data-juicer_dataset/RedPajama/indices/c4_2000.jsonl
    format: jsonl
export_path: /home/yyw/pipeline_full/results/text/text_pipeline_1781071569481_2000.jsonl
np: 30
use_cache: false
open_tracer: true
process:
- whitespace_normalization_mapper: null
- punctuation_normalization_mapper: null
- clean_ip_mapper: null
- remove_table_text_mapper: null
- remove_specific_chars_mapper: null
- sentence_split_mapper:
    lang: en
- clean_copyright_mapper: null
- replace_content_mapper:
    pattern: \d+(?:,\d+)*
    repl: ''
- remove_words_with_incorrect_substrings_mapper:
    lang: en
    tokenization: false
    substrings:
    - http
    - www
    - .com
    - href
    - //
- language_id_score_filter:
    lang: en
    min_score: 0.8
- words_num_filter:
    lang: en
    tokenization: false
    min_num: 92
    max_num: 1125
    batch_size: 2
- text_action_filter:
    lang: en
- special_characters_filter:
    min_ratio: 0.1
    max_ratio: 0.2
    batch_size: 3
- maximum_line_length_filter:
    min_len: 190
    max_len: 732
    batch_size: 2
- document_simhash_deduplicator:
    tokenization: space
    lowercase: false
    ignore_pattern: \p{P}
op_list_to_trace:
- whitespace_normalization_mapper
- punctuation_normalization_mapper
- clean_ip_mapper
- remove_table_text_mapper
- remove_specific_chars_mapper
- sentence_split_mapper
- clean_copyright_mapper
- replace_content_mapper
- remove_words_with_incorrect_substrings_mapper
- language_id_score_filter
- words_num_filter
- text_action_filter
- special_characters_filter
- maximum_line_length_filter
- document_simhash_deduplicator

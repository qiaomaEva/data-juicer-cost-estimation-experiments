project_name: text_pipeline_1781071569523_5000
dataset:
  configs:
  - type: local
    path: /data/data-juicer_dataset/RedPajama/indices/c4_5000.jsonl
    format: jsonl
export_path: /home/yyw/pipeline_full/results/text/text_pipeline_1781071569523_5000.jsonl
np: 50
use_cache: false
open_tracer: true
process:
- punctuation_normalization_mapper: null
- whitespace_normalization_mapper: null
- fix_unicode_mapper:
    normalization: NFC
- remove_long_words_mapper:
    min_len: 4
    max_len: 15
- sentence_split_mapper:
    lang: en
- replace_content_mapper:
    pattern: ●■
    repl: <hide>
- remove_specific_chars_mapper: null
- remove_table_text_mapper: null
- average_line_length_filter:
    min_len: 30
    max_len: 7335
    batch_size: 2
- alphanumeric_filter:
    tokenization: false
    min_ratio: 0.1
    max_ratio: 0.9
    batch_size: 3
    num_proc: 2
- perplexity_filter:
    lang: en
    max_ppl: 1521
    batch_size: 3
- word_repetition_filter:
    lang: en
    tokenization: false
    rep_len: 5
    min_ratio: 0.1
    max_ratio: 0.2
    batch_size: 3
- text_length_filter:
    min_len: 844
    max_len: 5768
- document_simhash_deduplicator:
    tokenization: character
    lowercase: false
    ignore_pattern: \p{P}
op_list_to_trace:
- punctuation_normalization_mapper
- whitespace_normalization_mapper
- fix_unicode_mapper
- remove_long_words_mapper
- sentence_split_mapper
- replace_content_mapper
- remove_specific_chars_mapper
- remove_table_text_mapper
- average_line_length_filter
- alphanumeric_filter
- perplexity_filter
- word_repetition_filter
- text_length_filter
- document_simhash_deduplicator

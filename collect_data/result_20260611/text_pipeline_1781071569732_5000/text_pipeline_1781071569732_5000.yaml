project_name: text_pipeline_1781071569732_5000
dataset:
  configs:
  - type: local
    path: /data/data-juicer_dataset/RedPajama/indices/c4_5000.jsonl
    format: jsonl
export_path: /home/yyw/pipeline_full/results/text/text_pipeline_1781071569732_5000.jsonl
np: 50
use_cache: false
open_tracer: true
process:
- punctuation_normalization_mapper: null
- whitespace_normalization_mapper: null
- replace_content_mapper:
    pattern: \d+(?:,\d+)*
    repl: ''
- remove_long_words_mapper:
    min_len: 5
    max_len: 11
- remove_table_text_mapper: null
- remove_specific_chars_mapper: null
- clean_copyright_mapper: null
- remove_repeat_sentences_mapper:
    lowercase: false
- stopwords_filter:
    lang: en
    tokenization: true
    min_ratio: 0.3
    use_words_aug: false
- text_action_filter:
    lang: en
- average_line_length_filter:
    min_len: 98
    max_len: 5361
    batch_size: 3
- special_characters_filter:
    min_ratio: 0.0
    max_ratio: 0.2
    batch_size: 2
- word_repetition_filter:
    lang: en
    tokenization: false
    rep_len: 15
    min_ratio: 0.1
    max_ratio: 0.5
    batch_size: 3
- text_chunk_mapper:
    max_len: 445
    split_pattern: \n
- token_num_filter:
    hf_tokenizer: EleutherAI/pythia-14m
    min_num: 160
    max_num: 1062
- perplexity_filter:
    lang: en
    max_ppl: 2129
    batch_size: 2
- text_length_filter:
    min_len: 202
    max_len: 7169
- document_simhash_deduplicator:
    tokenization: space
    lowercase: true
    ignore_pattern: \p{P}
op_list_to_trace:
- punctuation_normalization_mapper
- whitespace_normalization_mapper
- replace_content_mapper
- remove_long_words_mapper
- remove_table_text_mapper
- remove_specific_chars_mapper
- clean_copyright_mapper
- remove_repeat_sentences_mapper
- stopwords_filter
- text_action_filter
- average_line_length_filter
- special_characters_filter
- word_repetition_filter
- token_num_filter
- perplexity_filter
- text_length_filter
- document_simhash_deduplicator

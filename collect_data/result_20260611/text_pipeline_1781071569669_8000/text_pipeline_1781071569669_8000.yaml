project_name: text_pipeline_1781071569669_8000
dataset:
  configs:
  - type: local
    path: /data/data-juicer_dataset/RedPajama/indices/c4_8000.jsonl
    format: jsonl
export_path: /home/yyw/pipeline_full/results/text/text_pipeline_1781071569669_8000.jsonl
np: 50
use_cache: false
open_tracer: true
process:
- whitespace_normalization_mapper: null
- fix_unicode_mapper:
    normalization: NFKC
- punctuation_normalization_mapper: null
- remove_words_with_incorrect_substrings_mapper:
    lang: en
    tokenization: false
    substrings:
    - http
    - www
    - .com
    - href
    - //
- sentence_split_mapper:
    lang: en
- clean_links_mapper: null
- replace_content_mapper:
    pattern: \d+(?:,\d+)*
    repl: ''
- special_characters_filter:
    min_ratio: 0.1
    max_ratio: 0.2
    batch_size: 2
- text_length_filter:
    min_len: 627
    max_len: 1451
- words_num_filter:
    lang: en
    tokenization: false
    min_num: 195
    max_num: 832
    batch_size: 2
- average_line_length_filter:
    min_len: 71
    max_len: 5052
    batch_size: 3
- text_action_filter:
    lang: en
- perplexity_filter:
    lang: en
    max_ppl: 2061
    batch_size: 2
- language_id_score_filter:
    lang: en
    min_score: 0.8
- document_simhash_deduplicator:
    tokenization: space
    lowercase: false
    ignore_pattern: \p{P}
op_list_to_trace:
- whitespace_normalization_mapper
- fix_unicode_mapper
- punctuation_normalization_mapper
- remove_words_with_incorrect_substrings_mapper
- sentence_split_mapper
- clean_links_mapper
- replace_content_mapper
- special_characters_filter
- text_length_filter
- words_num_filter
- average_line_length_filter
- text_action_filter
- perplexity_filter
- language_id_score_filter
- document_simhash_deduplicator
